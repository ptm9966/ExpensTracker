name: build_publish_image
permissions: 
   contents: read
   packages: write
   id-token: write
   pull-requests: write
on: 
  push:
    branches:
      - main
  workflow_dispatch: 
jobs:
   build-image:
     name: build-publish_image
     runs-on: ubuntu-22.04
     steps:
       - name: checkout_code
         uses: actions/checkout@v6.0.2
       - name: setup_dotnet_version
         uses: actions/setup-dotnet@v5
         with:
            dotnet-version: '8.0.x'
       - name: dotnet_build
         run: |
            cd Expense_Tracker
            dotnet restore
            echo "dotnet build"
       - name: docker_login
         uses: docker/login-action@v3
         with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}
       - name: build_image
         shell: bash
         working-directory: Expense_Tracker
         run: |
           docker build  -f Dockerfile -t ghcr.io/expense_tracker/expense_tracker:latest \
           -t ghcr.io/expense_tracker/expense_tracker:${{ github.sha }} .
           
       - name: publish image
         run: |
             docker images
             docker push ghcr.io/expense_tracker/expense_tracker:latest
          




        
           



          
     
