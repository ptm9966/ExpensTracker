name: build_publish_image
permissions: 
   contents: read
   packages: write
   id-token: write
   pull-requests: write
on: 
  push:
    branches:
      - main
  workflow_dispatch: 
jobs:
   build-image:
     name: build-publish_image
     runs-on: ubuntu-22.04
     steps:
       - name: dotnet_build
         run: |
            dotnet restore
            echo "dotnet build"
       - name: docker_login
         uses: docker/login-action@v3
         with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}
       - name: build_image
         shell: bash
         run: |
           docker --version
           



          
     
