services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ptmsql
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Ptm@19941225
    volumes:
      - expensetracker_db:/var/opt/mssql
    ports:
      - "1433:1433"
    networks:
      - expensetracker-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Ptm@19941225 -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      retries: 5
      start_period: 45s
      timeout: 5s
    restart: unless-stopped

  migration:
    build:
      context: .
      dockerfile: Dockerfile.withoutbundle
    container_name: bookstore_Migration
    environment:
      ConnectionStrings__DefaultConnection: "Server=db;Database=BookStoreDb;User Id=sa;Password=Ptm@19941225;TrustServerCertificate=True"
    networks:
      - expensetracker-net
    depends_on:
      db:
        condition: service_healthy
    restart: "no"  # usually migrations run once, no restart

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bookstore
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Server=db;Database=BookStoreDb;User Id=sa;Password=Ptm@19941225;TrustServerCertificate=True"
    networks:
      - expensetracker-net
    depends_on:
      migration:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  expensetracker_db:
networks:
  expensetracker-net:
    driver: bridge