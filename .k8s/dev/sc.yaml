apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: ebs-csi-tracker
provisioner: disk.csi.azure.com
parameters:
  skuName: Standard_LRS
  kind: Managed  
#provisioner: ebs.csi.aws.com
#parameters:
  #type: gp3
  #fsType: ext4
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
