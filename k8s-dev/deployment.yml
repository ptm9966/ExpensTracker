apiVersion: apps/v1
kind: Deployment
metadata:
  name: expense-tracker-deployment
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: expense-tracker
      environment: dev
  template:
    metadata:
      labels:
        app: expense-tracker
        environment: dev
    spec:
      containers:
        - name: app
          image: ghcr.io/ptm9966/expense_tracker:e0813eddb85ec91505ca559842af2e2ea5982807
          env:
          - name: ConnectionStrings__DevConnection
            value: "Server=mssql-service;Database=Expense_tracker_Db;User Id=sa;Password=Ptm@19941225;TrustServerCertificate=True"
          ports:
          - containerPort: 80
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"
          liveinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:  
              path: /ready
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: expense-tracker-service
spec:
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: expense-tracker
    environment: dev
  type: LoadBalancer