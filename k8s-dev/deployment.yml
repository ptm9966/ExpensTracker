apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      containers:
      - name: app
        image: ghcr.io/ptm9966/expense_tracker:e0813eddb85ec91505ca559842af2e2ea5982807
        env:
        - name: ConnectionStrings__DevConnection
          value: "Server=mssql-service;Database=Expense_tracker_Db;User Id=sa;Password=Ptm@19941225;TrustServerCertificate=True"
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: app-service
spec:
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: app
  type: LoadBalancer